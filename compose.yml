services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - 8080:8080
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis_data:
