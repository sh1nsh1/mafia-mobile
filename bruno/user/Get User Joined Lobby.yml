info:
  name: Get User Joined Lobby
  type: http
  seq: 1

http:
  method: GET
  url: http://127.0.0.1:8080/user/lobby
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: http://127.0.0.1:8080/user/login
    credentials:
      placement: basic_auth_header
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
    settings:
      autoFetchToken: true
      autoRefreshToken: false

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
