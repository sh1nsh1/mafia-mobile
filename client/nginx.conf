events {
  worker_connections 1024;
}

http {
  include mime.types;
  server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      # Try serving the file directly, or fall back to index.html for client-side routing
      try_files $uri $uri/ /index.html;
    }
  }
}
